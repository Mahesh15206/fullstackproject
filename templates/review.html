<!-- review.html — Star rating and comment submission -->
{% extends 'base.html' %}
{% block title %}Review {{ reviewed_user.name }} — Skill Swap{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="bi bi-star"></i> Review {{ reviewed_user.name }}</h3>
                <form method="POST" action="{{ url_for('sessions_bp.review', user_id=user_id) }}">
                    <div class="mb-3">
                        <label class="form-label">Rating</label>
                        <div class="star-rating text-center" id="starRating">
                            {% for i in range(1, 6) %}
                            <i class="bi bi-star fs-2 star-icon" data-value="{{ i }}" style="cursor:pointer; color: #ccc;"
                               onclick="setRating({{ i }})"></i>
                            {% endfor %}
                        </div>
                        <input type="hidden" name="rating" id="ratingInput" value="5" required>
                    </div>
                    <div class="mb-3">
                        <label for="comment" class="form-label">Comment (optional)</label>
                        <textarea class="form-control" name="comment" id="comment" rows="4" placeholder="Share your experience..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-warning w-100"><i class="bi bi-send"></i> Submit Review</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Star rating interactive function
    function setRating(value) {
        document.getElementById('ratingInput').value = value;
        document.querySelectorAll('.star-icon').forEach(function(star) {
            if (parseInt(star.getAttribute('data-value')) <= value) {
                star.classList.remove('bi-star');
                star.classList.add('bi-star-fill');
                star.style.color = '#ffc107';
            } else {
                star.classList.remove('bi-star-fill');
                star.classList.add('bi-star');
                star.style.color = '#ccc';
            }
        });
    }
    setRating(5); // Default to 5 stars
</script>
{% endblock %}
