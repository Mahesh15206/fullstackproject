<!-- register.html — User registration form -->
{% extends 'base.html' %}
{% block title %}Register — Skill Swap{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-7">
        <div class="card glass-card border-0 shadow-lg fade-in-up">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex p-3 mb-3">
                        <i class="bi bi-person-plus fs-2"></i>
                    </div>
                    <h2 class="fw-bold">Join Skill Swap</h2>
                    <p class="text-muted">Teach what you know, learn what you love</p>
                </div>

                <form method="POST" action="{{ url_for('auth.register') }}" id="registerForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label fw-medium">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" placeholder="John Doe" required>
                            <div class="invalid-feedback" id="nameError"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label fw-medium">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                            <div class="invalid-feedback" id="emailError"></div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label fw-medium">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                        <div class="invalid-feedback" id="passwordError"></div>
                    </div>

                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="location" class="form-label fw-medium">Location (optional)</label>
                            <input type="text" class="form-control" id="location" name="location" placeholder="City, Country">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="bio" class="form-label fw-medium">Short Bio (optional)</label>
                        <textarea class="form-control" id="bio" name="bio" rows="2" placeholder="Tell us about yourself..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">Create Account</button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="mb-0 text-muted small">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-primary fw-semibold">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/validate.js') }}"></script>
{% endblock %}
