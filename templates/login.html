<!-- login.html — User login form -->
{% extends 'base.html' %}
{% block title %}Login — Skill Swap{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card glass-card border-0 shadow-lg fade-in-up">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex p-3 mb-3">
                        <i class="bi bi-box-arrow-in-right fs-2"></i>
                    </div>
                    <h2 class="fw-bold">Welcome Back</h2>
                    <p class="text-muted">Login to continue your skill swap journey</p>
                </div>
                
                <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label fw-medium">Email Address</label>
                        <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-medium">Password</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">Sign In</button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="mb-0 text-muted small">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/validate.js') }}"></script>
{% endblock %}
